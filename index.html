<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rocket Nose Bounce</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    /* Locks the screen to prevent Chrome address bar bouncing and pull-to-refresh */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      position: fixed; 
      touch-action: none; 
      color: white;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
    }
    #message-container {
      position: absolute;
      text-align: center;
      z-index: 10;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 16px;
      font-weight: normal;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="message-container">
    <div class="title" id="main-text">LOADING CAMERA...</div>
    <div class="subtitle" id="sub-text">(ALLOW ACCESS)</div>
  </div>
  
  <script>
    let video;
    let facemesh;
    let predictions = [];
    
    // Game states
    let gameState = 'LOADING'; 
    let score = 0;
    let isChrome = false;
    
    // Game objects
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 25 };
    let nose = { x: -100, y: -100, radius: 25 };

    // Math variables to keep the AI perfectly aligned with the screen
    let vW = 0, vH = 0;
    let scaleF = 1, offX = 0, offY = 0;

    function setup() {
      // Chrome Check
      let userAgent = navigator.userAgent;
      let vendor = navigator.vendor;
      isChrome = (/Chrome/.test(userAgent) && /Google Inc/.test(vendor)) || userAgent.match("CriOS");

      if (!isChrome) {
        gameState = 'BLOCKED';
        document.getElementById('main-text').innerText = "CHROME REQUIRED";
        document.getElementById('main-text').style.color = "#ff5555";
        document.getElementById('sub-text').innerText = "OPEN IN GOOGLE CHROME TO PLAY.";
        noCanvas();
        return; 
      }

      // Create a canvas that fills the exact pixels of the phone screen
      createCanvas(windowWidth, windowHeight);
      video = createCapture({ audio: false, video: { facingMode: "user" } });
      video.hide(); 
      
      // Calculate how to scale and crop the video to fill the screen
      video.elt.onloadedmetadata = () => {
        calculateVideoScale();
        resetGame();
      };

      facemesh = ml5.facemesh(video, () => {
        document.getElementById('message-container').style.display = 'none';
        gameState = 'ALIGN';
      });
      
      facemesh.on('predict', results => { predictions = results; });
      textAlign(CENTER, CENTER);
    }

    // Calculates the math needed to stretch the video WITHOUT misaligning the tracking
    function calculateVideoScale() {
      if (video.elt.videoWidth > 0) {
        vW = video.elt.videoWidth;
        vH = video.elt.videoHeight;
        let scaleX = width / vW;
        let scaleY = height / vH;
        scaleF = Math.max(scaleX, scaleY); // Cover the screen
        offX = (width - vW * scaleF) / 2;
        offY = (height - vH * scaleF) / 2;
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      calculateVideoScale();
    }

    function draw() {
      if (gameState === 'LOADING' || gameState === 'BLOCKED') return;

      background(20);

      // 1. Draw the perfectly scaled and centered video
      push();
      translate(width, 0);
      scale(-1, 1);
      image(video, offX, offY, vW * scaleF, vH * scaleF);
      pop();

      // Faint dark overlay for readability
      fill(0, 0, 0, 80);
      rect(0, 0, width, height);

      // 2. Update Nose Tracker with the new Screen Math
      if (predictions.length > 0) {
        let n = predictions[0].annotations.noseTip[0];
        
        // Map raw AI coordinates to our scaled/cropped screen coordinates
        let screenX = n[0] * scaleF + offX;
        let screenY = n[1] * scaleF + offY;
        
        // Mirror the X coordinate for the selfie camera
        let targetX = width - screenX; 
        
        nose.x = lerp(nose.x, targetX, 0.5); 
        nose.y = lerp(nose.y, screenY, 0.5);
      }
      
      // Draw faint tracker
      noStroke();
      fill(0, 255, 0, 15); 
      ellipse(nose.x, nose.y, nose.radius * 2);

      // --- STATE: ALIGN ---
      if (gameState === 'ALIGN') {
        let targetX = width / 2;
        let targetY = height / 2;
        let d = dist(nose.x, nose.y, targetX, targetY);
        let isAligned = d < 60;

        noFill();
        strokeWeight(4);
        let ringColor = lerpColor(color(255, 255, 255, 100), color(0, 255, 100), isAligned ? 1 : map(d, 0, 200, 1, 0));
        stroke(ringColor);
        ellipse(targetX, targetY, 120);
        
        noStroke();
        fill(255);
        textSize(26);
        if (isAligned) {
          fill(0, 255, 100);
          text("TAP TO START", width/2, height/2 + 100);
        } else {
          text("ALIGN NOSE TO START", width/2, height/2 + 100);
        }
      } 
      
      // --- STATE: PLAYING ---
      else if (gameState === 'PLAYING') {
        // Physics
        ball.vy += 0.15; 
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Wall collisions
        if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -0.8; }
        if (ball.x > width - ball.radius) { ball.x = width - ball.radius; ball.vx *= -0.8; }

        // Collision logic
        let d = dist(ball.x, ball.y, nose.x, nose.y);
        if (d < ball.radius + nose.radius && ball.vy > 0) {
          ball.vy = -7; 
          ball.vx = map(ball.x - nose.x, -nose.radius, nose.radius, -4, 4); 
          score++;
        }

        drawOptimizedRocketBadge(ball.x, ball.y, ball.radius);

        noStroke();
        fill(255, 200); 
        textSize(72);
        text(score, width/2, 100); 

        if (ball.y > height + ball.radius * 2) {
          gameState = 'GAMEOVER';
        }
      } 
      
      // --- STATE: GAMEOVER ---
      else if (gameState === 'GAMEOVER') {
        noStroke();
        fill(255, 50, 50);
        textSize(44);
        text("GAME OVER", width/2, height/2 - 50);
        
        fill(255);
        textSize(30);
        text("SCORE: " + score, width/2, height/2);
        
        fill(200);
        textSize(22);
        text("TAP TO RESTART", width/2, height/2 + 60);
      }
    }

    function drawOptimizedRocketBadge(x, y, radius) {
      push();
      translate(x, y);
      scale(radius/20); 

      // Background Shield
      noStroke();
      fill(200, 200, 210); 
      beginShape();
      vertex(0, -20);
      vertex(16, -15);
      vertex(18, 10);
      vertex(0, 25);
      vertex(-18, 10);
      vertex(-16, -15);
      endShape(CLOSE);

      // Rocket Fins
      fill(50); 
      triangle(-10, 5, -18, 18, -6, 12);
      triangle(10, 5, 18, 18, 6, 12);

      // Rocket Body
      fill(220, 50, 50); 
      beginShape();
      vertex(-6, 12);
      vertex(-6, -10);
      bezierVertex(-6,-20, 0, -25, 0, -25); 
      bezierVertex(0,-25, 6, -20, 6, -10);
      vertex(6, 12);
      endShape(CLOSE);

      // Static Flame
      if (gameState === 'PLAYING') {
          fill(255, 150, 0); 
          triangle(-4, 12, 4, 12, 0, 22);
      }
      
      // Port hole
      fill(100, 200, 255);
      ellipse(0, -5, 8, 8);
      
      pop();
    }

    function mousePressed() {
      if (gameState === 'BLOCKED') return false;
      if (gameState === 'ALIGN') {
        if (dist(nose.x, nose.y, width/2, height/2) < 60) {
          resetGame();
          gameState = 'PLAYING';
        }
      } else if (gameState === 'GAMEOVER') {
        gameState = 'ALIGN';
      }
      return false; 
    }

    function resetGame() {
      score = 0;
      ball.x = width / 2;
      ball.y = height / 4; 
      ball.vx = random(-2, 2); 
      ball.vy = 0;
    }
  </script>
</body>
</html>
