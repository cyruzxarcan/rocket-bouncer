<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rocket Nose Bounce</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      position: fixed; 
      touch-action: none; 
      color: white;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      /* Forces Hardware/GPU Acceleration on weak phones */
      transform: translateZ(0);
      will-change: transform;
    }
    #message-container {
      position: absolute;
      text-align: center;
      z-index: 10;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 16px;
      font-weight: normal;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="message-container">
    <div class="title" id="main-text">LOADING AI...</div>
    <div class="subtitle" id="sub-text">(ALLOW ACCESS)</div>
  </div>
  
  <script>
    let video;
    let facemesh;
    let predictions = [];
    
    let gameState = 'LOADING'; 
    let score = 0;
    
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 25 };
    let nose = { x: -100, y: -100, radius: 25 };

    let vW = 0, vH = 0;
    let scaleF = 1, offX = 0, offY = 0;

    function setup() {
      // MASSIVE OPTIMIZATIONS
      pixelDensity(1); 
      frameRate(30); // Cuts CPU load strictly in half!

      // Quick Chrome check
      let userAgent = navigator.userAgent;
      let vendor = navigator.vendor;
      let isChrome = (/Chrome/.test(userAgent) && /Google Inc/.test(vendor)) || userAgent.match("CriOS");

      if (!isChrome) {
        gameState = 'BLOCKED';
        document.getElementById('main-text').innerText = "CHROME REQUIRED";
        document.getElementById('main-text').style.color = "#ff5555";
        document.getElementById('sub-text').innerText = "OPEN IN CHROME TO PLAY.";
        noCanvas();
        return; 
      }

      createCanvas(windowWidth, windowHeight);
      
      // EXTREME CAMERA OPTIMIZATION: 240p
      video = createCapture({ 
        audio: false, 
        video: { 
          facingMode: "user",
          width: { ideal: 240 }, // Extremely low resolution
        } 
      });
      video.hide(); 
      
      video.elt.onloadedmetadata = () => {
        calculateVideoScale();
        resetGame();
      };

      // Lightweight AI settings
      facemesh = ml5.facemesh(video, { maxFaces: 1, refineLandmarks: false }, () => {
        document.getElementById('message-container').style.display = 'none';
        gameState = 'ALIGN';
      });
      
      facemesh.on('predict', results => { predictions = results; });
      textAlign(CENTER, CENTER);
    }

    function calculateVideoScale() {
      if (video.elt.videoWidth > 0) {
        vW = video.elt.videoWidth;
        vH = video.elt.videoHeight;
        let scaleX = width / vW;
        let scaleY = height / vH;
        scaleF = Math.max(scaleX, scaleY); 
        offX = (width - vW * scaleF) / 2;
        offY = (height - vH * scaleF) / 2;
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      calculateVideoScale();
    }

    // Helper to draw text with a cheap fake shadow instead of full-screen alpha box
    function drawShadowText(txt, x, y, size, col) {
      textSize(size);
      fill(0); // Black shadow
      text(txt, x + 2, y + 2);
      fill(col); // Actual color
      text(txt, x, y);
    }

    function draw() {
      if (gameState === 'LOADING' || gameState === 'BLOCKED') return;

      background(20);

      push();
      translate(width, 0);
      scale(-1, 1);
      image(video, offX, offY, vW * scaleF, vH * scaleF);
      pop();

      // Removed the full screen alpha rect here to save massive GPU processing

      if (predictions.length > 0) {
        let n = predictions[0].annotations.noseTip[0];
        let screenX = n[0] * scaleF + offX;
        let screenY = n[1] * scaleF + offY;
        
        // Since we are at 30fps, we must snap to the nose faster (0.8 instead of 0.6)
        nose.x = lerp(nose.x, width - screenX, 0.8); 
        nose.y = lerp(nose.y, screenY, 0.8);
      }
      
      // --- STATE: ALIGN ---
      if (gameState === 'ALIGN') {
        let targetX = width / 2;
        let targetY = height / 2;
        let d = dist(nose.x, nose.y, targetX, targetY);
        let isAligned = d < 60;

        strokeWeight(4);
        stroke(isAligned ? color(0, 255, 100) : color(255));
        noFill();
        ellipse(targetX, targetY, 120);
        
        noStroke();
        if (isAligned) {
          drawShadowText("TAP TO START", width/2, height/2 + 100, 26, color(0, 255, 100));
        } else {
          drawShadowText("ALIGN NOSE TO START", width/2, height/2 + 100, 26, color(255));
        }
      } 
      
      // --- STATE: PLAYING ---
      else if (gameState === 'PLAYING') {
        // Physics tuned for 30 FPS (everything moves slightly more per frame)
        ball.vy += 0.35; 
        ball.x += ball.vx;
        ball.y += ball.vy;

        if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -0.8; }
        if (ball.x > width - ball.radius) { ball.x = width - ball.radius; ball.vx *= -0.8; }

        let d = dist(ball.x, ball.y, nose.x, nose.y);
        if (d < ball.radius + nose.radius && ball.vy > 0) {
          ball.vy = -12; // Stronger bounce needed for 30fps
          ball.vx = map(ball.x - nose.x, -nose.radius, nose.radius, -8, 8); 
          score++;
        }

        drawOptimizedRocketBadge(ball.x, ball.y, ball.radius);

        noStroke();
        drawShadowText(score, width/2, 100, 72, color(255)); 

        if (ball.y > height + ball.radius * 2) {
          gameState = 'GAMEOVER';
        }
      } 
      
      // --- STATE: GAMEOVER ---
      else if (gameState === 'GAMEOVER') {
        noStroke();
        drawShadowText("GAME OVER", width/2, height/2 - 50, 44, color(255, 50, 50));
        drawShadowText("SCORE: " + score, width/2, height/2, 30, color(255));
        drawShadowText("TAP TO RESTART", width/2, height/2 + 60, 22, color(200));
      }
    }

    function drawOptimizedRocketBadge(x, y, radius) {
      push();
      translate(x, y);
      scale(radius/20); 

      noStroke();
      fill(200, 200, 210); 
      beginShape();
      vertex(0, -20);
      vertex(16, -15);
      vertex(18, 10);
      vertex(0, 25);
      vertex(-18, 10);
      vertex(-16, -15);
      endShape(CLOSE);

      fill(50); 
      triangle(-10, 5, -18, 18, -6, 12);
      triangle(10, 5, 18, 18, 6, 12);

      fill(220, 50, 50); 
      beginShape();
      vertex(-6, 12);
      vertex(-6, -10);
      bezierVertex(-6,-20, 0, -25, 0, -25); 
      bezierVertex(0,-25, 6, -20, 6, -10);
      vertex(6, 12);
      endShape(CLOSE);

      if (gameState === 'PLAYING') {
          fill(255, 150, 0); 
          triangle(-4, 12, 4, 12, 0, 22);
      }
      
      fill(100, 200, 255);
      ellipse(0, -5, 8, 8);
      
      pop();
    }

    function mousePressed() {
      if (gameState === 'BLOCKED') return false;
      if (gameState === 'ALIGN') {
        if (dist(nose.x, nose.y, width/2, height/2) < 60) {
          resetGame();
          gameState = 'PLAYING';
        }
      } else if (gameState === 'GAMEOVER') {
        gameState = 'ALIGN';
      }
      return false; 
    }

    function resetGame() {
      score = 0;
      ball.x = width / 2;
      ball.y = height / 4; 
      ball.vx = random(-4, 4); 
      ball.vy = 0;
    }
  </script>
</body>
</html>
