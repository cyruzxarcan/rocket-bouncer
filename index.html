<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rocket Nose Bounce</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      position: fixed; 
      touch-action: none; 
      color: white;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
    }
    #message-container {
      position: absolute;
      text-align: center;
      z-index: 10;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 16px;
      font-weight: normal;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="message-container">
    <div class="title" id="main-text">LOADING CAMERA...</div>
    <div class="subtitle" id="sub-text">(ALLOW ACCESS)</div>
  </div>
  
  <script>
    let video;
    let facemesh;
    let predictions = [];
    
    let gameState = 'LOADING'; 
    let score = 0;
    let isChrome = false;
    
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 25 };
    let nose = { x: -100, y: -100, radius: 25 };

    let vW = 0, vH = 0;
    let scaleF = 1, offX = 0, offY = 0;

    function setup() {
      // Prevents hidden Retina/High-DPI pixel quadrupling
      pixelDensity(1); 

      let userAgent = navigator.userAgent;
      let vendor = navigator.vendor;
      isChrome = (/Chrome/.test(userAgent) && /Google Inc/.test(vendor)) || userAgent.match("CriOS");

      if (!isChrome) {
        gameState = 'BLOCKED';
        document.getElementById('main-text').innerText = "CHROME REQUIRED";
        document.getElementById('main-text').style.color = "#ff5555";
        document.getElementById('sub-text').innerText = "OPEN IN CHROME TO PLAY.";
        noCanvas();
        return; 
      }

      createCanvas(windowWidth, windowHeight);
      
      // EXTREME OPTIMIZATION 1: Force a tiny 320x240 video feed. 
      // The AI processes 90% fewer pixels, practically eliminating lag.
      video = createCapture({ 
        audio: false, 
        video: { 
          facingMode: "user",
          width: { ideal: 320 }, 
          height: { ideal: 240 }
        } 
      });
      video.hide(); 
      
      video.elt.onloadedmetadata = () => {
        calculateVideoScale();
        resetGame();
      };

      // EXTREME OPTIMIZATION 2: Tell AI to skip heavy math for eyes/lips
      const faceOptions = {
        maxFaces: 1,
        refineLandmarks: false // We only need the nose!
      };

      facemesh = ml5.facemesh(video, faceOptions, () => {
        document.getElementById('message-container').style.display = 'none';
        gameState = 'ALIGN';
      });
      
      facemesh.on('predict', results => { predictions = results; });
      textAlign(CENTER, CENTER);
      noStroke(); // Turn off stroke calculations globally
    }

    function calculateVideoScale() {
      if (video.elt.videoWidth > 0) {
        vW = video.elt.videoWidth;
        vH = video.elt.videoHeight;
        let scaleX = width / vW;
        let scaleY = height / vH;
        scaleF = Math.max(scaleX, scaleY); 
        offX = (width - vW * scaleF) / 2;
        offY = (height - vH * scaleF) / 2;
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      calculateVideoScale();
    }

    function draw() {
      if (gameState === 'LOADING' || gameState === 'BLOCKED') return;

      background(20);

      push();
      translate(width, 0);
      scale(-1, 1);
      // Because the video is now 320p, it might look slightly pixelated, 
      // but it will be buttery smooth!
      image(video, offX, offY, vW * scaleF, vH * scaleF);
      pop();

      fill(0, 0, 0, 80);
      rect(0, 0, width, height);

      if (predictions.length > 0) {
        let n = predictions[0].annotations.noseTip[0];
        
        let screenX = n[0] * scaleF + offX;
        let screenY = n[1] * scaleF + offY;
        let targetX = width - screenX; 
        
        // Increased lerp speed slightly (0.5 to 0.6) to keep it snappy
        nose.x = lerp(nose.x, targetX, 0.6); 
        nose.y = lerp(nose.y, screenY, 0.6);
      }
      
      fill(0, 255, 0, 15); 
      ellipse(nose.x, nose.y, nose.radius * 2);

      // --- STATE: ALIGN ---
      if (gameState === 'ALIGN') {
        let targetX = width / 2;
        let targetY = height / 2;
        let d = dist(nose.x, nose.y, targetX, targetY);
        let isAligned = d < 60;

        strokeWeight(4);
        let ringColor = lerpColor(color(255, 255, 255, 100), color(0, 255, 100), isAligned ? 1 : map(d, 0, 200, 1, 0));
        stroke(ringColor);
        noFill();
        ellipse(targetX, targetY, 120);
        
        noStroke();
        fill(255);
        textSize(26);
        if (isAligned) {
          fill(0, 255, 100);
          text("TAP TO START", width/2, height/2 + 100);
        } else {
          text("ALIGN NOSE TO START", width/2, height/2 + 100);
        }
      } 
      
      // --- STATE: PLAYING ---
      else if (gameState === 'PLAYING') {
        ball.vy += 0.15; 
        ball.x += ball.vx;
        ball.y += ball.vy;

        if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -0.8; }
        if (ball.x > width - ball.radius) { ball.x = width - ball.radius; ball.vx *= -0.8; }

        let d = dist(ball.x, ball.y, nose.x, nose.y);
        if (d < ball.radius + nose.radius && ball.vy > 0) {
          ball.vy = -7; 
          ball.vx = map(ball.x - nose.x, -nose.radius, nose.radius, -4, 4); 
          score++;
        }

        drawOptimizedRocketBadge(ball.x, ball.y, ball.radius);

        fill(255, 200); 
        textSize(72);
        text(score, width/2, 100); 

        if (ball.y > height + ball.radius * 2) {
          gameState = 'GAMEOVER';
        }
      } 
      
      // --- STATE: GAMEOVER ---
      else if (gameState === 'GAMEOVER') {
        fill(255, 50, 50);
        textSize(44);
        text("GAME OVER", width/2, height/2 - 50);
        
        fill(255);
        textSize(30);
        text("SCORE: " + score, width/2, height/2);
        
        fill(200);
        textSize(22);
        text("TAP TO RESTART", width/2, height/2 + 60);
      }
    }

    function drawOptimizedRocketBadge(x, y, radius) {
      push();
      translate(x, y);
      scale(radius/20); 

      fill(200, 200, 210); 
      beginShape();
      vertex(0, -20);
      vertex(16, -15);
      vertex(18, 10);
      vertex(0, 25);
      vertex(-18, 10);
      vertex(-16, -15);
      endShape(CLOSE);

      fill(50); 
      triangle(-10, 5, -18, 18, -6, 12);
      triangle(10, 5, 18, 18, 6, 12);

      fill(220, 50, 50); 
      beginShape();
      vertex(-6, 12);
      vertex(-6, -10);
      bezierVertex(-6,-20, 0, -25, 0, -25); 
      bezierVertex(0,-25, 6, -20, 6, -10);
      vertex(6, 12);
      endShape(CLOSE);

      if (gameState === 'PLAYING') {
          fill(255, 150, 0); 
          triangle(-4, 12, 4, 12, 0, 22);
      }
      
      fill(100, 200, 255);
      ellipse(0, -5, 8, 8);
      
      pop();
    }

    function mousePressed() {
      if (gameState === 'BLOCKED') return false;
      if (gameState === 'ALIGN') {
        if (dist(nose.x, nose.y, width/2, height/2) < 60) {
          resetGame();
          gameState = 'PLAYING';
        }
      } else if (gameState === 'GAMEOVER') {
        gameState = 'ALIGN';
      }
      return false; 
    }

    function resetGame() {
      score = 0;
      ball.x = width / 2;
      ball.y = height / 4; 
      ball.vx = random(-2, 2); 
      ball.vy = 0;
    }
  </script>
</body>
</html>
